<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DigitalIO Image Compressor - Reduce image size online instantly for free.">
  <title>Compress Image Online Free</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8f8f8; }
    h1 { margin-bottom: 5px; }
    p { margin-bottom: 20px; color: #555; }
    input[type=file] { margin-bottom: 10px; }
    img { max-width: 300px; margin-top: 10px; border: 1px solid #ccc; padding: 5px; }
    button { margin-top: 10px; padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
    input[type=range] { width: 300px; }
    .size { margin-top: 5px; color: #333; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@1.0.17/dist/browser-image-compression.js"></script>
</head>
<body>
  <h1>Compress Image Online Free</h1>
  <p>Reduce image size instantly</p>
  
  <input type="file" id="fileInput" accept="image/jpeg,image/png"><br>
  <label for="quality">Quality: <span id="qualityValue">0.7</span></label><br>
  <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7"><br>
  
  <button id="compressBtn">Compress</button>
  
  <div>
    <p class="size" id="originalSize"></p>
    <img id="originalPreview" src="#" alt="" style="display:none;">
    <p class="size" id="compressedSize"></p>
    <img id="compressedPreview" src="#" alt="" style="display:none;">
    <a id="downloadLink" href="#" download style="display:none;">
      <button>Download Compressed Image</button>
    </a>
  </div>
  
  <script>
    const fileInput = document.getElementById("fileInput");
    const compressBtn = document.getElementById("compressBtn");
    const qualitySlider = document.getElementById("quality");
    const qualityValue = document.getElementById("qualityValue");
    const originalPreview = document.getElementById("originalPreview");
    const compressedPreview = document.getElementById("compressedPreview");
    const originalSizeText = document.getElementById("originalSize");
    const compressedSizeText = document.getElementById("compressedSize");
    const downloadLink = document.getElementById("downloadLink");
    let selectedFile;

    qualitySlider.oninput = () => { qualityValue.innerText = qualitySlider.value; };

    fileInput.onchange = (e) => {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      originalPreview.src = URL.createObjectURL(selectedFile);
      originalPreview.style.display = "block";
      originalSizeText.innerText = "Original size: " + (selectedFile.size / 1024).toFixed(2) + " KB";
    };

    compressBtn.onclick = async () => {
      if (!selectedFile) { alert("Please choose an image first"); return; }
      const options = { maxSizeMB: 2, useWebWorker: true, initialQuality: parseFloat(qualitySlider.value) };
      try {
        const compressedFile = await imageCompression(selectedFile, options);
        compressedPreview.src = URL.createObjectURL(compressedFile);
        compressedPreview.style.display = "block";
        compressedSizeText.innerText = "Compressed size: " + (compressedFile.size / 1024).toFixed(2) + " KB";

        const fileName = selectedFile.name.replace(/\.(jpg|jpeg|png)$/i, "-compressed.$1");
        downloadLink.href = URL.createObjectURL(compressedFile);
        downloadLink.download = fileName;
        downloadLink.style.display = "inline-block";
      } catch (err) {
        alert("Compression failed: " + err.message);
      }
    };
  </script>
</body>
</html>
