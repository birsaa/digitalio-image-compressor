<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitalIO Tools Hub</title>
<meta name="description" content="DigitalIO Hub: Free online tools for image compression, resizing, CSV conversion, invoice generation, PDF export, word counting and more.">
<style>
  body { font-family: 'Arial', sans-serif; margin:0; padding:0; background:#f5f5f5; }
  h1 { text-align:center; padding:20px 0; color:#333; }
  .container { display:flex; flex-wrap:wrap; justify-content:center; max-width:1200px; margin:auto; }
  .card { background:white; box-shadow:0 4px 8px rgba(0,0,0,0.1); margin:15px; padding:20px; border-radius:10px; flex:1 1 300px; max-width:350px; }
  h2 { margin-top:0; color:#222; font-size:1.2em; }
  input, textarea, button, select { width:100%; padding:8px; margin:5px 0; border-radius:5px; border:1px solid #ccc; }
  button { background:#007bff; color:white; border:none; cursor:pointer; }
  button:hover { background:#0056b3; }
  img { max-width:100%; margin-top:10px; border-radius:5px; }
  table { width:100%; border-collapse:collapse; margin-top:10px; }
  table, th, td { border:1px solid #ccc; padding:5px; text-align:left; }
  @media (max-width:600px){ .card { max-width:90%; } }
</style>

<!-- Libraries -->
<script src="https://unpkg.com/browser-image-compression@1.0.16/dist/browser-image-compression.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body>

<h1>DigitalIO Tools Hub</h1>
<div class="container">

<!-- Image Compressor -->
<div class="card">
<h2>Image Compressor</h2>
<input type="file" id="compressImage">
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
<button onclick="compress()">Compress</button>
<img id="preview">
<p id="sizeInfo"></p>
</div>

<!-- Image Resizer -->
<div class="card">
<h2>Image Resizer</h2>
<input type="file" id="resizeImage">
<input type="number" id="resizeWidth" placeholder="Width px">
<input type="number" id="resizeHeight" placeholder="Height px">
<button onclick="resizeImageFunc()">Resize</button>
<img id="resizePreview">
</div>

<!-- Word Counter -->
<div class="card">
<h2>Word Counter</h2>
<textarea id="wordText" rows="3" placeholder="Enter text"></textarea>
<button onclick="countWords()">Count Words</button>
<p id="wordResult"></p>
</div>

<!-- Text Case Converter -->
<div class="card">
<h2>Text Case Converter</h2>
<textarea id="textCaseInput" rows="3" placeholder="Enter text"></textarea>
<select id="caseSelect">
<option value="upper">UPPERCASE</option>
<option value="lower">lowercase</option>
<option value="title">Title Case</option>
<option value="sentence">Sentence case</option>
</select>
<button onclick="convertCase()">Convert</button>
<p id="caseResult"></p>
</div>

<!-- HTML to PDF -->
<div class="card">
<h2>HTML to PDF</h2>
<textarea id="htmlContent" rows="4" placeholder="Enter HTML here"></textarea>
<button onclick="htmlToPDF()">Download PDF</button>
</div>

<!-- Invoice Generator -->
<div class="card">
<h2>Invoice Generator</h2>
<input type="text" id="companyName" placeholder="Company Name">
<input type="text" id="clientName" placeholder="Client Name">
<input type="text" id="invoiceNumber" placeholder="Invoice Number">
<input type="date" id="invoiceDate">
<table id="invoiceTable">
<tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr>
</table>
<button onclick="addInvoiceItem()">Add Item</button>
<button onclick="generateInvoice()">Download Invoice PDF</button>
</div>

<!-- CSV to Excel / Excel to CSV -->
<div class="card">
<h2>CSV ↔ Excel Converter</h2>
<input type="file" id="csvExcelFile">
<button onclick="convertCSVExcel()">Convert</button>
<p id="csvExcelResult"></p>
</div>

</div>

<script>
// Image Compressor
async function compress() {
  const file = document.getElementById('compressImage').files[0];
  if(!file) return alert('Upload image first');
  const options = { maxSizeMB:1, initialQuality: parseFloat(document.getElementById('quality').value) };
  const compressed = await imageCompression(file, options);
  const preview = document.getElementById('preview');
  preview.src = URL.createObjectURL(compressed);
  document.getElementById('sizeInfo').innerText = `Original: ${(file.size/1024).toFixed(1)} KB, Compressed: ${(compressed.size/1024).toFixed(1)} KB`;
}

// Image Resizer
function resizeImageFunc() {
  const file = document.getElementById('resizeImage').files[0];
  const width = parseInt(document.getElementById('resizeWidth').value);
  const height = parseInt(document.getElementById('resizeHeight').value);
  if(!file || !width || !height) return alert('Upload image and set width/height');
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img,0,0,width,height);
    document.getElementById('resizePreview').src = canvas.toDataURL('image/png');
  };
  img.src = URL.createObjectURL(file);
}

// Word Counter
function countWords() {
  const text = document.getElementById('wordText').value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('wordResult').innerText = words + " words";
}

// Text Case Converter
function convertCase() {
  let text = document.getElementById('textCaseInput').value;
  const type = document.getElementById('caseSelect').value;
  if(type==='upper') text = text.toUpperCase();
  else if(type==='lower') text = text.toLowerCase();
  else if(type==='title') text = text.replace(/\w\S*/g, w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase());
  else if(type==='sentence') text = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
  document.getElementById('caseResult').innerText = text;
}

// HTML to PDF
function htmlToPDF() {
  html2pdf().from(document.getElementById('htmlContent').value).save('document.pdf');
}

// Invoice Generator
function addInvoiceItem() {
  const table = document.getElementById('invoiceTable');
  const row = table.insertRow();
  for(let i=0;i<4;i++) row.insertCell().innerHTML = '<input type="text">';
}

function generateInvoice() {
  let html = `<h2>Invoice</h2>
  <p>Company: ${document.getElementById('companyName').value}</p>
  <p>Client: ${document.getElementById('clientName').value}</p>
  <p>Invoice #: ${document.getElementById('invoiceNumber').value}</p>
  <p>Date: ${document.getElementById('invoiceDate').value}</p>`;
  html += document.getElementById('invoiceTable').outerHTML;
  html2pdf().from(html).save('invoice.pdf');
}

// CSV ↔ Excel
function convertCSVExcel() {
  const file = document.getElementById('csvExcelFile').files[0];
  if(!file) return alert('Upload CSV or Excel file');
  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:'array'});
    XLSX.writeFile(workbook,'converted.xlsx');
    document.getElementById('csvExcelResult').innerText = "File converted successfully!";
  };
  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
